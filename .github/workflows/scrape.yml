name: Weekly Event Scraper

on:
  schedule:
    # Every Monday at 6:00 AM UTC (1:00 AM or 2:00 AM CT depending on DST)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run scraper
        run: python .github/scripts/scraper.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/events.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated events
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git commit -m "chore: update events data [$(date -u '+%Y-%m-%d')]"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "events.json is already up to date — no commit needed."
